<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Saya</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Nama Lengkap Anda</h1>
        <p>Sub-judul Kompetensi</p>
        <button id="theme-toggle">Ubah Tema (Light/Dark)</button>
    </header>

    <section id="about">
        <h2>About Me</h2>
        <p>Narasi formal tentang pendidikan dan minat teknologi Anda.</p>
    </section>

    <section id="projects">
        <h2>Project Showcases</h2>
        <div class="card-container">
            <div class="card">
                <h3>Proyek 1</h3>
                <p>Deskripsi singkat proyek pertama Anda.</p>
            </div>
            <div class="card">
                <h3>Proyek 2</h3>
                <p>Deskripsi singkat proyek kedua Anda.</p>
            </div>
            <div class="card">
                <h3>Proyek 3</h3>
                <p>Deskripsi singkat proyek ketiga Anda.</p>
            </div>
        </div>
    </section>

    <section id="contact">
        <h2>Contact</h2>
        <form>
            <input type="text" placeholder="Nama Anda" required>
            <input type="email" placeholder="Email Anda" required>
            <textarea placeholder="Pesan" required></textarea>
            <button type="submit">Kirim</button>
        </form>
    </section>

    <script src="script.js"></script>
</body>
</html>
